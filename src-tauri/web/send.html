<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/fonts/all.min.css" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"
    />
    <title data-i18n="mobile_send_files">Send to PC - Su!</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC",
          "Microsoft YaHei", sans-serif;
        background: #f5f4f2;
        height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 24px 20px max(20px, env(safe-area-inset-bottom));
        -webkit-tap-highlight-color: transparent;
        overflow: hidden;
      }
      .page {
        width: 100%;
        max-width: 400px;
        display: none;
        flex-direction: column;
        gap: 16px;
        min-height: 0;
      }
      .page.active {
        display: flex;
        flex: 1;
        min-height: 0;
      }
      .top {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 4px;
      }
      .top-text h1 {
        font-size: 20px;
        font-weight: 750;
        color: #1a1a1a;
        letter-spacing: -0.3px;
      }
      .top-text p {
        font-size: 12px;
        color: #999;
        margin-top: 1px;
      }
      .top-icon {
        width: 54px;
        height: 54px;
        border-radius: 16px;
        background: rgba(0, 0, 0, 0.06);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .top-icon i {
        color: #1a1a1a;
      }
      .top-text {
        min-width: 0;
      }

      /* === PAGE 1: SELECT === */
      .pick {
        background: rgba(255, 255, 255, 0.75);
        border: 2px dashed #d4d0cc;
        border-radius: 18px;
        padding: 36px 20px;
        text-align: center;
        cursor: pointer;
        transition: all 0.2s;
      }
      .pick:active {
        border-color: #1a1a1a;
        background: rgba(255, 255, 255, 0.95);
      }
      .pick-inner {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
      }
      .pick-icon {
        width: 54px;
        height: 54px;
        border-radius: 16px;
        background: rgba(0, 0, 0, 0.08);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .pick-icon i {
        color: rgba(0, 0, 0, 0.45);
        font-size: 28px;
      }
      .pick-t {
        font-size: 16px;
        font-weight: 600;
        color: #1a1a1a;
      }
      .pick-h {
        font-size: 13px;
        color: rgba(0, 0, 0, 0.35);
      }

      .flist {
        display: flex;
        flex-direction: column;
        gap: 8px;
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        background: rgba(255, 255, 255, 0.75);
        border: 2px solid #e8e5e0;
        border-radius: 18px;
        padding: 8px;
      }
      .frow {
        display: flex;
        align-items: center;
        gap: 10px;
        background: rgba(255, 255, 255, 0.85);
        border: 1px solid #e8e5e0;
        border-radius: 12px;
        padding: 10px 12px;
      }
      .frow .fi {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .frow .fn {
        font-size: 13px;
        font-weight: 600;
        color: #1a1a1a;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .frow .fs {
        font-size: 11px;
        color: #999;
      }
      .frow .fx {
        width: 28px;
        height: 28px;
        border-radius: 8px;
        border: none;
        background: transparent;
        color: #bbb;
        cursor: pointer;
        font-size: 14px;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .frow .fx:active {
        color: #e55;
        background: rgba(238, 85, 85, 0.1);
      }

      .btn {
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 14px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.15s;
        font-family: inherit;
        -webkit-appearance: none;
      }
      .btn-p {
        background: #1a1a1a;
        color: #fff;
      }
      .btn-p:active {
        opacity: 0.8;
      }
      .btn-p:disabled {
        opacity: 0.35;
        pointer-events: none;
      }
      .btn-s {
        background: transparent;
        color: #666;
        border: 1px solid #e8e5e0;
      }
      .btn-s:active {
        background: rgba(0, 0, 0, 0.03);
      }
      .btn-a {
        width: 100%;
        padding: 10px;
        border: 1px dashed #d4d0cc;
        border-radius: 12px;
        background: transparent;
        color: #999;
        font: inherit;
        font-size: 13px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
      }
      .btn-a:active {
        background: rgba(0, 0, 0, 0.03);
      }

      /* === PAGE 2: SENDING === */
      .st {
        background: rgba(255, 255, 255, 0.9);
        border: 1px solid #e8e5e0;
        border-radius: 18px;
        padding: 28px 24px;
        text-align: center;
      }
      .st-icon {
        font-size: 40px;
        margin-bottom: 12px;
        color: #1a1a1a;
      }
      .st-t {
        font-size: 17px;
        font-weight: 600;
        color: #1a1a1a;
        margin-bottom: 4px;
      }
      .st-d {
        font-size: 13px;
        color: #999;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .pb {
        height: 8px;
        background: #e8e5e0;
        border-radius: 4px;
        margin: 16px 0 10px;
        overflow: hidden;
      }
      .pf {
        height: 100%;
        background: #1a1a1a;
        border-radius: 4px;
        transition: width 0.3s;
        width: 0%;
      }
      .st-row {
        display: flex;
        justify-content: space-between;
        font-size: 13px;
        color: #999;
        font-family: "SF Mono", "Fira Code", monospace;
      }

      /* === PAGE 3: DONE === */
      .done {
        background: rgba(255, 255, 255, 0.9);
        border: 1px solid #e8e5e0;
        border-radius: 18px;
        padding: 28px 24px;
        text-align: center;
      }
      .done-icon {
        font-size: 48px;
        color: #34c759;
        margin-bottom: 12px;
      }
      .done-t {
        font-size: 17px;
        font-weight: 600;
        color: #1a1a1a;
        margin-bottom: 4px;
      }
      .done-d {
        font-size: 13px;
        color: #999;
      }

      @media (prefers-color-scheme: dark) {
        body {
          background: #1c1c1e;
        }
        .top-icon {
          background: rgba(255, 255, 255, 0.1);
        }
        .top-text h1,
        .pick-t,
        .st-t,
        .st-icon,
        .done-t,
        .frow .fn,
        .top-icon i {
          color: #e8e8ec;
        }
        .top-text p,
        .pick-h,
        .st-d,
        .done-d,
        .frow .fs {
          color: #888;
        }
        .pick {
          background: rgba(255, 255, 255, 0.04);
          border-color: #2e2e32;
        }
        .pick:active {
          border-color: #e8e8ec;
          background: rgba(255, 255, 255, 0.08);
        }
        .pick-icon {
          background: rgba(255, 255, 255, 0.15);
        }
        .pick-icon i {
          color: rgba(255, 255, 255, 0.8);
        }
        .frow {
          background: rgba(255, 255, 255, 0.06);
          border-color: #2e2e32;
        }
        .frow .fx {
          color: #666;
        }
        .frow .fx:active {
          color: #e55;
        }
        .flist {
          background: rgba(255, 255, 255, 0.04);
          border-color: #2e2e32;
        }
        .st,
        .done {
          background: rgba(255, 255, 255, 0.06);
          border-color: #2e2e32;
        }
        .pb {
          background: #333;
        }
        .pf {
          background: #e8e8ec;
        }
        .btn-p {
          background: #e8e8ec;
          color: #1c1c1e;
        }
        .btn-s {
          color: #888;
          border-color: #2e2e32;
        }
        .btn-s:active {
          background: rgba(255, 255, 255, 0.04);
        }
        .btn-a {
          border-color: #2e2e32;
          color: #888;
        }
        .btn-a:active {
          background: rgba(255, 255, 255, 0.04);
        }
      }
    </style>
  </head>
  <body>
    <div class="page active" id="page-select">
      <div class="top">
        <div class="top-icon">
          <i class="fa-solid fa-desktop" style="font-size: 28px"></i>
        </div>
        <div class="top-text">
          <h1 data-i18n="mobile_send_files">Send to PC</h1>
          <p data-i18n="mobile_lan_hint">Select files to transfer</p>
        </div>
      </div>
      <div class="pick" id="pz">
        <div class="pick-inner">
          <div class="pick-icon">
            <i class="fa-solid fa-cloud-arrow-up"></i>
          </div>
          <div class="pick-t" data-i18n="mobile_drop_zone">Drop files here</div>
          <div class="pick-h" data-i18n="mobile_any_format">
            Any format, any size
          </div>
        </div>
      </div>
      <div class="flist" id="flist" style="display: none"></div>
      <button
        class="btn btn-a"
        id="addBtn"
        style="display: none"
        data-i18n="mobile_add_more"
      >
        <i class="fa-solid fa-plus"></i> Add More
      </button>
      <input type="file" id="fi" multiple style="display: none" />
      <button class="btn btn-p" id="ab" data-i18n="mobile_send_btn">
        Send
      </button>
    </div>

    <div class="page" id="page-send">
      <div class="st">
        <div class="st-icon" id="sticon">
          <i class="fa-solid fa-paper-plane"></i>
        </div>
        <div class="st-t" id="stt">准备发送...</div>
        <div class="st-d" id="std"></div>
        <div class="pb"><div class="pf" id="pf"></div></div>
        <div class="st-row">
          <span id="spct">0%</span><span id="sspd"></span>
        </div>
      </div>
      <button
        class="btn btn-s"
        id="cb"
        data-i18n="mobile_back"
        data-i18n="mobile_back"
      >
        Cancel
      </button>
    </div>

    <div class="page" id="page-done">
      <div class="done">
        <div class="done-icon" id="done-icon">
          <i class="fa-solid fa-circle-check"></i>
        </div>
        <div class="done-t" id="done-t" data-i18n="mobile_sent">Sent</div>
        <div class="done-d" id="done-d"></div>
      </div>
      <button class="btn btn-p" id="retryBtn" data-i18n="mobile_continue">
        Continue
      </button>
    </div>

    <script>
      var TIMEOUT_MS = 600000;
      var files = [],
        state = "idle",
        xhr = null,
        t0 = 0,
        lastLoaded = 0,
        lastTime = 0;
      var pageSelect = document.getElementById("page-select"),
        pageSend = document.getElementById("page-send"),
        pageDone = document.getElementById("page-done");
      var pz = document.getElementById("pz"),
        fi = document.getElementById("fi");
      var flist = document.getElementById("flist"),
        addBtn = document.getElementById("addBtn");
      var ab = document.getElementById("ab"),
        cb = document.getElementById("cb");
      var sticon = document.getElementById("sticon"),
        stt = document.getElementById("stt"),
        std = document.getElementById("std");
      var pf = document.getElementById("pf"),
        spct = document.getElementById("spct"),
        sspd = document.getElementById("sspd");
      var retryBtn = document.getElementById("retryBtn");
      var doneT = document.getElementById("done-t"),
        doneD = document.getElementById("done-d");

      function showPage(id) {
        pageSelect.classList.toggle("active", id === "select");
        pageSend.classList.toggle("active", id === "send");
        pageDone.classList.toggle("active", id === "done");
      }

      function fmtSpd(bps) {
        if (bps < 1024) return bps.toFixed(0) + " B/s";
        if (bps < 1048576) return (bps / 1024).toFixed(1) + " KB/s";
        return (bps / 1048576).toFixed(1) + " MB/s";
      }
      function fmtSize(b) {
        if (b < 1024) return b + " B";
        if (b < 1048576) return (b / 1048576).toFixed(1) + " KB";
        if (b < 1073741824) return (b / 1048576).toFixed(1) + " MB";
        return (b / 1073741824).toFixed(2) + " GB";
      }

      pz.addEventListener("click", function () {
        fi.click();
      });
      fi.addEventListener("change", function () {
        for (var i = 0; i < fi.files.length; i++) files.push(fi.files[i]);
        fi.value = "";
        updateUI();
      });

      function updateUI() {
        var n = files.length;
        flist.innerHTML = "";
        files.forEach(function (f, i) {
          var row = document.createElement("div");
          row.className = "frow";
          row.innerHTML =
            '<div class="fi"><div class="fn">' +
            f.name +
            '</div><div class="fs">' +
            fmtSize(f.size) +
            '</div></div><button class="fx" data-idx="' +
            i +
            '"><i class="fa-solid fa-xmark"></i></button>';
          row.querySelector(".fx").addEventListener("click", function (e) {
            e.stopPropagation();
            files.splice(parseInt(this.dataset.idx), 1);
            updateUI();
          });
          flist.appendChild(row);
        });
        pz.style.display = n ? "none" : "block";
        flist.style.display = n ? "flex" : "none";
        addBtn.style.display = n ? "flex" : "none";
        ab.disabled = n === 0;
      }

      addBtn.addEventListener("click", function () {
        fi.click();
      });

      ab.addEventListener("click", function () {
        if (files.length === 0 || state !== "idle") return;
        ab.disabled = true;
        showPage("send");
        state = "sending";
        stt.textContent = SU.t("mobile_waiting");
        std.textContent = "";
        sticon.innerHTML = '<i class="fa-solid fa-clock"></i>';
        pf.style.width = "0%";
        spct.textContent = "";
        sspd.textContent = "";
        var currentIdx = 0, totalSent = 0, confirmed = false;
        // Let browser paint the sending page before blocking on sync XHR
        setTimeout(function() {
        // Send /upload-start first (sync, but fast when auto_receive=true)
        var sx = new XMLHttpRequest();
        sx.open("POST", "/upload-start", false);
        try { sx.send("" + files.length); confirmed = (sx.status === 200); }
        catch(e) { confirmed = false; }
        if (!confirmed) {
          state = "idle";
          stt.textContent = SU.t(sx.status === 403 ? "mobile_rejected" : "mobile_failed");
          std.textContent = "";
          sticon.innerHTML = '<i class="fa-solid fa-ban"></i>';
          pf.style.width = "0%";
          spct.textContent = "";
          sspd.textContent = "";
          if (sx.status === 403) setTimeout(function() { showPage("select"); }, 2000);
          else showPage("select");
          return;
        }
        sticon.innerHTML = '<i class="fa-solid fa-paper-plane"></i>';

        function sendNext() {
          if (currentIdx >= files.length) {
            var totalFiles = files.length;
            files = [];
            updateUI();
            state = "done";
            doneT.textContent = SU.t("mobile_sent");
            doneD.textContent = SU.t("mobile_sent_count")
              .replace("{n}", totalSent)
              .replace("{t}", totalFiles);
            showPage("done");
            return;
          }
          var f = files[currentIdx];
          stt.textContent = SU.t("mobile_sending_n")
            .replace("{n}", currentIdx + 1)
            .replace("{t}", files.length);
          std.textContent = f.name;
          pf.style.width = "0%";
          spct.textContent = "0%";
          sspd.textContent = "";

          xhr = new XMLHttpRequest();
          xhr.open("POST", "/upload?name=" + encodeURIComponent(f.name), true);
          xhr.timeout = TIMEOUT_MS;
          t0 = Date.now();
          lastLoaded = 0;
          lastTime = t0;

          var uploadDone = false,
            transferDone = false,
            fallbackTimer = null;

          xhr.upload.onprogress = function (e) {
            if (!e.lengthComputable) return;
            var now = Date.now(),
              p = Math.round((e.loaded / e.total) * 100);
            pf.style.width = p + "%";
            spct.textContent = p + "%";
            var elapsed = (now - lastTime) / 1000;
            var speed = elapsed > 0.1 ? (e.loaded - lastLoaded) / elapsed : 0;
            if (elapsed > 0.5) {
              sspd.textContent = fmtSpd(speed);
              lastLoaded = e.loaded;
              lastTime = now;
            }
            if (e.loaded === e.total && !uploadDone) {
              uploadDone = true;
              std.textContent = SU.t("mobile_waiting");
              fallbackTimer = setTimeout(function () {
                if (!transferDone) {
                  handleResult(true);
                }
              }, 8000);
            }
          };

          function handleResult(ok) {
            if (transferDone) return;
            transferDone = true;
            if (fallbackTimer) {
              clearTimeout(fallbackTimer);
              fallbackTimer = null;
            }
            if (ok) {
              totalSent++;
              currentIdx++;
              sendNext();
            } else {
              doneT.textContent = SU.t("mobile_sent");
              doneD.textContent = f.name;
              showPage("done");
            }
          }

          xhr.onreadystatechange = function () {
            if (xhr.readyState === 4) {
              if (xhr.status === 200) {
                pf.style.width = "100%";
                spct.textContent = "100%";
                handleResult(true);
              } else handleResult(false);
            }
          };
          xhr.onerror = function () {
            handleResult(false);
          };
          xhr.ontimeout = function () {
            handleResult(false);
          };
          xhr.send(f);
        }
        sendNext();
        }, 50);
      });

      cb.addEventListener("click", function () {
        if (xhr) {
          xhr.abort();
          xhr = null;
        }
        state = "idle";
        files = [];
        updateUI();
        ab.disabled = false;
        showPage("select");
      });
      retryBtn.addEventListener("click", function () {
        state = "idle";
        ab.disabled = false;
        showPage("select");
        setTimeout(function () {
          ab.click();
        }, 200);
      });

      updateUI();
    </script>
    <script src="/i18n.js"></script>
    <script>
      window.__SU_LANG = SU.detectLang(window.__SU_LANG);
      document.addEventListener("DOMContentLoaded", function () {
        SU.applyI18n();
      });
    </script>
  </body>
</html>
