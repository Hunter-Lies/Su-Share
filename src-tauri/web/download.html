<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="/fonts/all.min.css">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title data-i18n="mobile_receive_file">接收文件 - Su!</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC","Microsoft YaHei",sans-serif;background:#f5f4f2;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:24px;-webkit-tap-highlight-color:transparent}
.c{width:100%;max-width:360px;display:flex;flex-direction:column;align-items:center;gap:20px}
.iw{width:80px;height:80px;background:#fff;border-radius:22px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(0,0,0,.06);color:#1a1a1a}
.t{font-size:22px;font-weight:700;color:#1a1a1a;text-align:center}
.fn{font-size:16px;font-weight:500;color:#1a1a1a;text-align:center;word-break:break-all;max-width:100%}
.fs{font-size:14px;color:#999}
.btn{width:100%;padding:16px;border:none;border-radius:16px;font-size:17px;font-weight:600;cursor:pointer;transition:all .15s;font-family:inherit;-webkit-appearance:none;text-align:center;display:block;text-decoration:none}
.btn-a{background:#1a1a1a;color:#fff}
.btn-a:active{opacity:.85;transform:scale(.98)}
@media(prefers-color-scheme:dark){
body{background:#1c1c1e}
.t,.fn{color:#e8e8ec}
.fs{color:#888}
.iw{background:#2a2a2e;box-shadow:0 4px 20px rgba(0,0,0,.3);color:#e8e8ec}
.btn-a{background:#e8e8ec;color:#1c1c1e}
}
</style>
</head>
<body>
<div class="c">
<div class="iw"><i class="fa-solid fa-download" style="font-size:36px"></i></div>
<div class="t" data-i18n="mobile_file_ready">文件就绪</div>
<div class="fn">__NAME__</div>
<div class="fs">__SIZE__</div>
<a class="btn btn-a" id="dbtn" href="__URL__" download="__NAME__" data-i18n="mobile_download">下载文件</a>
</div>
<script>
(function(){
  var dbtn = document.getElementById('dbtn');
  var dlUrl = '__URL__';
  var dlName = '__NAME__';
  
  dbtn.addEventListener('click', async function(e){
    e.preventDefault();
    this.textContent = SU.t('mobile_downloading');
    this.style.opacity = '.7';
    this.style.pointerEvents = 'none';
    
    // try blob download first (avoids browser hijacking)
    try {
      var resp = await fetch(dlUrl);
      if (!resp.ok) throw new Error('fetch failed');
      var blob = await resp.blob();
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = dlName;
      a.style.display = 'none';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
    } catch(err) {
      // fallback: direct link
      var a = document.createElement('a');
      a.href = dlUrl;
      a.download = dlName;
      a.style.display = 'none';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }
  });

  var wakeLock = null;
  async function keepAwake() {
    try {
      if ("wakeLock" in navigator) {
        wakeLock = await navigator.wakeLock.request("screen");
      }
    } catch(e) {}
  }
  dbtn.addEventListener("click", keepAwake);
})();
</script>
<script src="/i18n.js"></script>
<script>
window.__SU_LANG = SU.detectLang(window.__SU_LANG);
SU.applyI18n();
</script>
</body>
</html>
