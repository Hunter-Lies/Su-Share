<div class="settings-sub hidden" id="settings-sub-notification">
              <div class="set-sub-back">
                <i class="fa-solid fa-chevron-left"></i
                ><span data-i18n="settings_notification">通知</span>
              </div>
              <div class="set-sub-body">
                <div class="set-group">
                  <div class="set-row set-row-split">
                    <div>
                      <div class="set-label" data-i18n="notif_sound">
                        通知声音
                      </div>
                      <div class="set-desc" data-i18n="notif_sound_desc">
                        收到文件时播放提示音
                      </div>
                    </div>
                    <label class="set-toggle"
                      ><input type="checkbox" id="sound-toggle" /><span
                        class="set-toggle-knob"
                      ></span
                    ></label>
                  </div>
                </div>
                <div class="set-group">
                  <div class="set-row set-row-split">
                    <div>
                      <div class="set-label" data-i18n="sound_type">提示音</div>
                      <div class="set-desc" data-i18n="sound_type_desc">
                        选择收到文件时的音效
                      </div>
                    </div>
                    <div class="set-dd" id="sound-dd">
                      <button
                        class="set-dd-btn"
                        id="sound-dd-btn"
                        type="button"
                      >
                        <span id="sound-dd-label">投递</span
                        ><svg
                          viewBox="0 0 24 24"
                          fill="none"
                          stroke="currentColor"
                          stroke-width="2"
                          width="12"
                          height="12"
                        >
                          <polyline points="6 9 12 15 18 9" />
                        </svg>
                      </button>
                      <div class="set-dd-menu" id="sound-dd-menu">
                        <div class="set-dd-item" data-value="投递">投递</div>
                        <div class="set-dd-item" data-value="啵">啵</div>
                        <div class="set-dd-item" data-value="WhatsApp">
                          WhatsApp
                        </div>
                        <div class="set-dd-item" data-value="太空狼人杀">
                          太空狼人杀
                        </div>
                        <div class="set-dd-item" data-value="皮克通恩">
                          皮克通恩
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
                <div class="set-group">
                  <div class="set-row set-row-split">
                    <div>
                      <div class="set-label" data-i18n="notif_popup">
                        收到文件弹窗
                      </div>
                      <div class="set-desc" data-i18n="notif_popup_desc">
                        收到文件时弹出卡片提示
                      </div>
                    </div>
                    <label class="set-toggle"
                      ><input type="checkbox" id="popup-toggle" checked /><span
                        class="set-toggle-knob"
                      ></span
                    ></label>
                  </div>
                </div>
              </div>
            </div>
