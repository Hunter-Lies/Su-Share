<div class="settings-sub hidden" id="settings-sub-receive">
              <div class="set-sub-back">
                <i class="fa-solid fa-chevron-left"></i
                ><span data-i18n="settings_receive">接收</span>
              </div>
              <div class="set-sub-body">
                <div class="set-group">
                  <div class="set-row set-row-split">
                    <div>
                      <div class="set-label" data-i18n="receive_dir">
                        接收目录
                      </div>
                      <div class="set-desc" data-i18n="receive_dir_desc">
                        手机发送到电脑的文件保存位置
                      </div>
                    </div>
                    <button
                      class="set-btn"
                      id="pick-dir-btn"
                      data-i18n="change_dir"
                    >
                      更改
                    </button>
                  </div>
                  <div class="set-path" id="downloads-dir">C:\Users\...</div>
                </div>
                <div class="set-group">
                  <div class="set-row set-row-split">
                    <div>
                      <div class="set-label" data-i18n="clear_received">
                        关闭时清除接收记录
                      </div>
                      <div class="set-desc" data-i18n="clear_received_desc">
                        关闭应用时自动删除接收记录（文件保留）
                      </div>
                    </div>
                    <label class="set-toggle"
                      ><input type="checkbox" id="clear-received-toggle" /><span
                        class="set-toggle-knob"
                      ></span
                    ></label>
                  </div>
                </div>
              </div>
            </div>
