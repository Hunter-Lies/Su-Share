<div class="settings-sub hidden" id="settings-sub-software">
              <div class="set-sub-back">
                <i class="fa-solid fa-chevron-left"></i
                ><span data-i18n="settings_software">软件</span>
              </div>
              <div class="set-sub-body">
                <div class="set-group">
                  <div class="set-row set-row-split">
                    <div>
                      <div class="set-label" data-i18n="autostart">
                        开机自启
                      </div>
                      <div class="set-desc" data-i18n="autostart_desc">
                        系统启动时自动运行 Su!
                      </div>
                    </div>
                    <label class="set-toggle"
                      ><input type="checkbox" id="autostart-toggle" /><span
                        class="set-toggle-knob"
                      ></span
                    ></label>
                  </div>
                </div>
                <div class="set-group">
                  <div class="set-row set-row-split">
                    <div>
                      <div class="set-label" data-i18n="tray_close">
                        关闭到托盘
                      </div>
                      <div class="set-desc" data-i18n="tray_close_desc">
                        点击关闭按钮时最小化到系统托盘
                      </div>
                    </div>
                    <label class="set-toggle"
                      ><input type="checkbox" id="tray-toggle" /><span
                        class="set-toggle-knob"
                      ></span
                    ></label>
                  </div>
                </div>
                <div class="set-group">
                  <div class="set-row set-row-split">
                    <div>
                      <div class="set-label" data-i18n="desktop_shortcut">
                        桌面快捷方式
                      </div>
                      <div class="set-desc" data-i18n="desktop_shortcut_desc">
                        在桌面创建 Su! 快捷方式
                      </div>
                    </div>
                    <button
                      class="set-btn"
                      id="shortcut-btn"
                      data-i18n="create_btn"
                    >
                      创建
                    </button>
                  </div>
                </div>
                <div class="set-group">
                  <div class="set-row set-row-split">
                    <div>
                      <div class="set-label" data-i18n="context_menu">
                        右键菜单
                      </div>
                      <div class="set-desc" data-i18n="context_menu_desc">
                        在文件右键菜单显示"通过 Su! 分享"
                      </div>
                    </div>
                    <button
                      class="set-btn"
                      id="context-menu-btn"
                      data-i18n="register_btn"
                    >
                      注册
                    </button>
                  </div>
                </div>
                <div class="set-group">
                  <div class="set-row set-row-split">
                    <div>
                      <div class="set-label" data-i18n="reset_defaults">
                        还原默认设置
                      </div>
                      <div class="set-desc" data-i18n="reset_defaults_desc">
                        将所有设置恢复为初始状态
                      </div>
                    </div>
                    <button
                      class="set-btn"
                      id="reset-defaults-btn"
                      style="color: #e55; border-color: #e55"
                      data-i18n="reset_btn"
                    >
                      还原
                    </button>
                  </div>
                </div>
              </div>
            </div>
