<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Su! - 局域网文件快传</title>
    <link rel="stylesheet" href="assets/fonts/all.min.css" />
    <link rel="stylesheet" href="css/styles.css" />
    <script type="module" src="js/main.js" defer></script>
  </head>
  <body>
    <div class="window">
      <div class="titlebar" data-tauri-drag-region>
        <div class="tb-title">Su!</div>
        <div class="tb-actions">
          <button
            class="tb-btn"
            id="tb-minimize"
            data-i18n-title="minimize"
            title="最小化"
          >
            <svg width="12" height="12" viewBox="0 0 12 12">
              <line
                x1="2"
                y1="6"
                x2="10"
                y2="6"
                stroke="currentColor"
                stroke-width="1.2"
                stroke-linecap="round"
              />
            </svg>
          </button>
          <button
            class="tb-btn"
            id="tb-maximize"
            data-i18n-title="maximize"
            title="最大化"
          >
            <svg width="12" height="12" viewBox="0 0 12 12">
              <rect
                x="2"
                y="2"
                width="8"
                height="8"
                rx="1"
                fill="none"
                stroke="currentColor"
                stroke-width="1.2"
              />
            </svg>
          </button>
          <button
            class="tb-btn tb-close"
            id="tb-close"
            data-i18n-title="close"
            title="关闭"
          >
            <svg width="12" height="12" viewBox="0 0 12 12">
              <line
                x1="2"
                y1="2"
                x2="10"
                y2="10"
                stroke="currentColor"
                stroke-width="1.2"
                stroke-linecap="round"
              />
              <line
                x1="10"
                y1="2"
                x2="2"
                y2="10"
                stroke="currentColor"
                stroke-width="1.2"
                stroke-linecap="round"
              />
            </svg>
          </button>
        </div>
      </div>
      <div class="body">
        <aside class="sidebar" id="sidebar">
          <div class="s-logo">
            <div class="s-logo-icon">
              <div
                style="
                  width: 30px;
                  height: 30px;
                  background: var(--t);
                  border-radius: 12px;
                  display: flex;
                  align-items: center;
                  justify-content: center;
                "
              >
                <i
                  class="fa-solid fa-bolt"
                  style="font-size: 18px; color: var(--bg2)"
                ></i>
              </div>
            </div>
            <div class="s-title">
              <span class="s-main">Su!</span
              ><span class="s-sub" data-i18n="slogan">咻一下，就到了</span>
            </div>
          </div>
          <nav class="s-nav">
            <div class="s-nav-item active" data-tab="share">
              <span class="s-nav-icon"
                ><svg
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8" />
                  <polyline points="16 6 12 2 8 6" />
                  <line x1="12" y1="2" x2="12" y2="15" /></svg
              ></span>
              <span class="s-nav-label" data-i18n="tab_share">文件分享</span>
            </div>
            <div class="s-nav-item" data-tab="received">
              <span class="s-nav-icon"
                ><svg
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4" />
                  <polyline points="7 10 12 15 17 10" />
                  <line x1="12" y1="15" x2="12" y2="3" /></svg
              ></span>
              <span class="s-nav-label" data-i18n="tab_received">接收记录</span>
            </div>
          </nav>
          <div class="s-spacer"></div>

          <nav class="s-nav s-nav-bot">
            <div class="s-nav-item" data-tab="settings">
              <span class="s-nav-icon"
                ><svg
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <circle cx="12" cy="12" r="3" />
                  <path
                    d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"
                  /></svg
              ></span>
              <span class="s-nav-label" data-i18n="tab_settings">设置</span>
            </div>
          </nav>
        </aside>
        <main class="main" id="main-content">
        </main>
      </div>
    </div>
    <div id="qr-modal" class="modal hidden">
      <div class="modal-bg"></div>
      <div class="modal-card">
        <button class="modal-x">&times;</button>
        <div id="qr-modal-img" class="modal-qr"></div>
        <h3 id="qr-modal-name"></h3>
        <code id="qr-modal-url"></code
        ><button class="modal-btn" id="qr-modal-copy" data-i18n="copy_link">
          复制链接
        </button>
      </div>
    </div>

    
    <div id="upload-confirm-modal" class="modal hidden">
      <div class="modal-bg"></div>
      <div class="modal-card">
        <h3 data-i18n="confirm_title">确认接收</h3>
        <p id="confirm-body" style="color:var(--t2);font-size:14px;margin:0 0 20px"></p>
        <div class="confirm-btns">
          <button class="btn-reject" id="confirm-reject-btn" data-i18n="confirm_reject">拒绝</button>
          <button class="btn-accept" id="confirm-accept-btn" data-i18n="confirm_accept">接收</button>
        </div>
      </div>
    </div>
<div id="received-modal" class="modal hidden">
      <div class="modal-bg"></div>
      <div class="modal-card">
        <button class="modal-x" id="received-modal-x">&times;</button>
        <div
          id="received-modal-icon"
          class="modal-qr"
          style="
            font-size: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
          "
        >
          <i class="fa-solid fa-circle-check" style="color: #22c55e"></i>
        </div>
        <h3
          id="received-modal-title"
          style="font-size: 18px; margin: 0 0 4px"
        ></h3>
        <p
          id="received-modal-detail"
          style="color: var(--t2); font-size: 14px; margin: 0 0 20px"
        ></p>
        <button class="modal-btn" id="received-modal-btn" data-i18n="view_file">
          查看文件
        </button>
      </div>
    </div>

    <div id="toast" class="toast hidden"></div>
      <div class="resize-handle n" data-dir="n"></div>
    <div class="resize-handle e" data-dir="e"></div>
    <div class="resize-handle s" data-dir="s"></div>
    <div class="resize-handle w" data-dir="w"></div>
    <div class="resize-handle ne" data-dir="ne"></div>
    <div class="resize-handle nw" data-dir="nw"></div>
    <div class="resize-handle se" data-dir="se"></div>
    <div class="resize-handle sw" data-dir="sw"></div>
    <script>
      (function() {
        if (!window.__TAURI__) return;
        var handles = document.querySelectorAll('.resize-handle');
        if (navigator.platform.indexOf('Win') !== 0) {
          handles.forEach(function(h) { h.style.display = 'none'; });
          return;
        }
        var invoke = window.__TAURI__.core.invoke;
        var resizing = false, dir = null, startX, startY, startW, startH;
        handles.forEach(function(h) {
          h.addEventListener('mousedown', function(e) {
            resizing = true;
            dir = h.dataset.dir;
            startX = e.screenX;
            startY = e.screenY;
            startW = window.outerWidth;
            startH = window.outerHeight;
            e.preventDefault();
          });
        });
        document.addEventListener('mousemove', function(e) {
          if (!resizing) return;
          var dx = e.screenX - startX;
          var dy = e.screenY - startY;
          var newW = startW, newH = startH;
          if (dir.indexOf('e') >= 0) newW = Math.max(680, startW + dx);
          if (dir.indexOf('w') >= 0) newW = Math.max(680, startW - dx);
          if (dir.indexOf('s') >= 0) newH = Math.max(440, startH + dy);
          if (dir.indexOf('n') >= 0) newH = Math.max(440, startH - dy);
          invoke('resize_window', { width: newW, height: newH }).catch(function(){});
        });
        document.addEventListener('mouseup', function() { resizing = false; dir = null; });
      })();
    </script>
  </body>
</html>
